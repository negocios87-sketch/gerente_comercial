<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forecast Comercial — Board Academy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #B8860B;
      --gold-lt:   #D4A017;
      --gold-bg:   #FFF9E6;
      --navy:      #1A1A2E;
      --navy-lt:   #2C2C4A;
      --bg:        #F4F5F7;
      --white:     #FFFFFF;
      --text:      #1E1E2E;
      --text-muted:#6B7280;
      --border:    #E2E4E9;
      --green:     #0D7A3E;
      --green-bg:  #ECFDF5;
      --red:       #B91C1C;
      --red-bg:    #FEF2F2;
      --amber:     #92400E;
      --amber-bg:  #FFFBEB;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }
    .header-left { display: flex; align-items: center; gap: 28px; }
    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand-bar {
      width: 3px; height: 22px;
      background: var(--gold);
      border-radius: 2px;
    }
    .brand-text {
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .brand-sub {
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 1.5px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .periodo-badge {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px;
      padding: 4px 12px;
      color: rgba(255,255,255,.75);
      font-size: 12px;
    }
    .periodo-badge strong { color: var(--gold); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .update-info { color: rgba(255,255,255,.45); font-size: 11px; }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 5px;
      color: rgba(255,255,255,.6);
      font-size: 11px;
      padding: 5px 12px;
      text-decoration: none;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TABS ── */
    .tab-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      gap: 0;
    }
    .tab {
      padding: 12px 18px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .3px;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--navy); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── MAIN ── */
    .main { padding: 24px 28px; max-width: 1600px; }

    /* ── SECTION ── */
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: .3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 3px; height: 14px;
      background: var(--gold);
      border-radius: 2px;
    }

    /* ── TOGGLE ── */
    .toggle-group {
      display: inline-flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-btn {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      transition: all .15s;
      letter-spacing: .3px;
    }
    .toggle-btn.active {
      background: var(--navy);
      color: var(--white);
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── TABLE ── */
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    thead tr { background: var(--navy); }
    thead th {
      color: rgba(255,255,255,.7);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: 10px 14px;
      text-align: right;
      white-space: nowrap;
      border-right: 1px solid rgba(255,255,255,.06);
    }
    thead th:first-child { text-align: left; padding-left: 18px; }
    thead th:last-child { border-right: none; }

    /* Grupo headers */
    .th-group {
      background: rgba(255,255,255,.04);
      color: var(--gold) !important;
      font-size: 9px !important;
      letter-spacing: 1px !important;
      padding: 6px 14px !important;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-align: center !important;
    }
    .th-group:first-child { text-align: left !important; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: #F8F9FF; }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 11px 14px;
      text-align: right;
      white-space: nowrap;
      color: var(--text);
    }
    td:first-child { text-align: left; padding-left: 18px; font-weight: 600; }

    /* Linhas especiais */
    .row-total {
      background: var(--gold-bg) !important;
      border-top: 2px solid var(--gold) !important;
    }
    .row-total td { font-weight: 700; color: var(--navy); }
    .row-total td:first-child { color: var(--gold); }

    .row-meta120 { background: var(--bg) !important; }
    .row-meta120 td { color: var(--text-muted); font-style: italic; }
    .row-meta120 td:first-child { color: var(--text-muted); font-weight: 600; }

    /* Valores */
    .val-real { color: var(--navy); font-weight: 600; }
    .val-multi { color: #5B21B6; font-weight: 600; }

    /* Badges de % */
    .pct-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      min-width: 52px;
    }
    .pct-green  { background: var(--green-bg);  color: var(--green); }
    .pct-amber  { background: var(--amber-bg);  color: var(--amber); }
    .pct-red    { background: var(--red-bg);    color: var(--red); }

    .deficit { color: var(--red); font-weight: 500; }
    .surplus { color: var(--green); font-weight: 500; }

    /* Separador de grupos */
    .col-sep { border-left: 1px solid var(--border) !important; }



    /* ── FILTER ── */
    .filter-group { display: flex; gap: 6px; align-items: center; }
    .filter-group select {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px;
      color: var(--white);
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .filter-group select:hover { border-color: var(--gold); }
    .filter-group select option { background: #1A1A2E; color: white; }

    /* ── EXPAND ROWS ── */
    .row-squad { cursor: pointer; user-select: none; }
    .row-squad:hover { background: #F0F4FF !important; }
    .row-squad td:first-child::before {
      content: '▶';
      display: inline-block;
      font-size: 9px;
      color: var(--gold);
      margin-right: 8px;
      transition: transform .2s;
    }
    .row-squad.open td:first-child::before { transform: rotate(90deg); }
    .row-member { display: none; background: #FAFBFF !important; }
    .row-member.visible { display: table-row; }
    .row-member td:first-child { padding-left: 44px; font-weight: 400; color: var(--text-muted); }
    .row-member td { font-size: 11px; }
    .row-sdr-group { cursor: pointer; user-select: none; }
    .row-sdr-group:hover { background: #F0F4FF !important; }
    .row-sdr-group td:first-child::before {
      content: '▶';
      display: inline-block;
      font-size: 9px;
      color: var(--gold);
      margin-right: 8px;
      transition: transform .2s;
    }
    .row-sdr-group.open td:first-child::before { transform: rotate(90deg); }



    /* ── HEAD CARD EXTRAS ── */
    .head-card-equipe {
      font-size: 10px; color: var(--gold); font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase;
      margin-bottom: 12px; margin-top: -6px;
    }
    .head-progress-label { font-size: 10px; color: var(--text-muted); margin-top: 12px; margin-bottom: 4px; }
    .head-progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .head-progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
    .head-progress-pct { font-size: 11px; font-weight: 700; color: var(--navy); margin-top: 4px; text-align: right; }

    /* ── SDR BARS ── */
    .sdr-bars-section { padding: 16px 20px; border-top: 1px solid var(--border); }
    .sdr-bars-title { font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .sdr-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .sdr-bar-name { width: 160px; font-size: 12px; color: var(--text); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sdr-bar-bg { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .sdr-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
    .sdr-bar-pct { width: 48px; font-size: 11px; font-weight: 700; text-align: right; flex-shrink: 0; }

    /* ── HEAD RESULTS ── */
    .head-results { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; }
    .head-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 220px;
      flex: 1 1 220px;
      box-shadow: var(--shadow);
    }
    .head-card-name { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
    .head-card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; }
    .head-card-label { color: var(--text-muted); }
    .head-card-total { 
      margin-top: 10px; padding-top: 10px; 
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: 700;
    }
    .badge-lider {
      font-size: 9px; font-weight: 700; letter-spacing: .5px;
      background: var(--gold-bg); color: var(--gold); border: 1px solid var(--gold);
      border-radius: 3px; padding: 1px 5px; margin-left: 6px; vertical-align: middle;
    }

    /* ── LOADING ── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      gap: 12px;
      color: var(--text-muted);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { padding: 40px; text-align: center; color: var(--red); }

    /* ── PANEL ── */
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="brand">
      <div class="brand-bar"></div>
      <div>
        <div class="brand-text">BOARD ACADEMY</div>
        <div class="brand-sub">Forecast Comercial</div>
      </div>
    </div>
    <div class="periodo-badge" id="periodo-badge">Carregando...</div>
  </div>
  <div class="header-right">
    <div class="filter-group">
      <select id="sel-mes" onchange="fetchAbril()">
        <option value="1">Janeiro</option>
        <option value="2">Fevereiro</option>
        <option value="3">Março</option>
        <option value="4" selected>Abril</option>
        <option value="5">Maio</option>
        <option value="6">Junho</option>
        <option value="7">Julho</option>
        <option value="8">Agosto</option>
        <option value="9">Setembro</option>
        <option value="10">Outubro</option>
        <option value="11">Novembro</option>
        <option value="12">Dezembro</option>
      </select>
      <select id="sel-ano" onchange="fetchAbril()">
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
      </select>
    </div>
    <span class="update-info" id="update-info"></span>
    <a href="/logout" class="btn-logout">Sair ({{ nome }})</a>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" onclick="setTab('abril')" id="tab-abril">Abril 2026</div>
  <div class="tab" onclick="setTab('forecast')">Forecast Diário</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ABRIL -->
  <div class="panel active" id="panel-abril">
    <div id="abril-content">
      <div class="card">
        <div class="loading-state">
          <div class="spinner"></div>
          Buscando dados no Pipedrive...
        </div>
      </div>
    </div>
  </div>

  <!-- FORECAST DIÁRIO -->
  <div class="panel" id="panel-forecast">
    <div class="card">
      <div class="loading-state" style="color:#9CA3AF">
        Em construção — chegando em breve.
      </div>
    </div>
  </div>

</div>

<script>
// ── TABS ──────────────────────────────────────────────────────
function setTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['abril','forecast'][i] === tab));
  document.querySelectorAll('.panel').forEach((p, i) =>
    p.classList.toggle('active', ['panel-abril','panel-forecast'][i] === `panel-${tab}`));
}

// ── FORMATAÇÃO ────────────────────────────────────────────────
const R = v => 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 0});
const P = v => v == null ? '—' : Number(v).toFixed(1) + '%';
const N = v => Number(v).toLocaleString('pt-BR');

function pctBadge(pct) {
  const cls = pct >= 100 ? 'pct-green' : pct >= 60 ? 'pct-amber' : 'pct-red';
  return `<span class="pct-badge ${cls}">${P(pct)}</span>`;
}

function deficitVal(v) {
  if (v <= 0) return `<span class="surplus">${R(Math.abs(v))}</span>`;
  return `<span class="deficit">${R(v)}</span>`;
}



function renderHeadResults(heads) {
  if (!heads || !heads.length) return '';
  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Resultado por Head</div>
      </div>
      <div class="head-results">
        ${heads.map(h => `
          <div class="head-card">
            <div class="head-card-name">${h.nome}</div>
            <div class="head-card-equipe">${h.equipes ? h.equipes.join(' · ') : ''}</div>
            <div class="head-card-row">
              <span class="head-card-label">Closers c/ Multi</span>
              <span>${pctBadge(h.ating_closer)}</span>
            </div>
            <div class="head-card-row">
              <span class="head-card-label">SDR Final</span>
              <span>${pctBadge(h.ating_sdr)}</span>
            </div>
            <div class="head-card-total">
              <span>Total</span>
              <span>${pctBadge(h.total_final)}</span>
            </div>
            <div class="head-progress-label">Atingimento Geral</div>
            <div class="head-progress-bar">
              <div class="head-progress-fill" style="width:${Math.min(h.total_final,100)}%;background:${h.total_final>=100?'#0D7A3E':h.total_final>=60?'#B8860B':'#B91C1C'}"></div>
            </div>
            <div class="head-progress-pct">${h.total_final.toFixed(1)}%</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="sdr-bars-section">
      <div class="sdr-bars-title">Atingimento Final por SDR</div>
      <div class="sdr-bars">
        ${body.map(s => `
          <div class="sdr-bar-row">
            <div class="sdr-bar-name">${s.nome}</div>
            <div class="sdr-bar-bg">
              <div class="sdr-bar-fill" style="width:${Math.min(s.pct_final,100)}%;background:${s.pct_final>=100?'#0D7A3E':s.pct_final>=60?'#B8860B':'#B91C1C'}"></div>
            </div>
            <div class="sdr-bar-pct ${s.pct_final>=100?'pct-green':s.pct_final>=60?'pct-amber':'pct-red'}">${s.pct_final.toFixed(1)}%</div>
          </div>`).join('')}
      </div>
    </div>
  `;
}

function buildMemberRow(row, groupId) {
  const pSem = row.pct_atingido ?? 0;
  const pCom = row.pct_atingido_multi ?? 0;
  const isHead = row.is_head;
  const nomeLbl = isHead ? `${row.nome} <span class="badge-lider">LÍDER</span>` : row.nome;
  const metaVal = row.meta > 0 ? R(row.meta) : '—';
  const pctSemVal = row.meta > 0 ? pctBadge(pSem) : '—';
  const pctComVal = row.meta > 0 ? pctBadge(pCom) : '—';
  return `
    <tr class="row-member" data-member="${groupId}">
      <td>${nomeLbl}</td>
      <td>${metaVal}</td>
      <td>${row.meta > 0 ? N(row.dias_uteis) : '—'}</td>
      <td>${row.meta > 0 ? R(row.meta_du) : '—'}</td>
      <td class="col-sem val-real">${R(row.realizado)}</td>
      <td class="col-sem">${pctSemVal}</td>
      <td class="col-sem">${row.meta > 0 ? R(row.mtd) : '—'}</td>
      <td class="col-sem">${row.meta > 0 ? deficitVal(row.deficit_mtd) : '—'}</td>
      <td class="col-sem">${row.meta > 0 ? pctBadge(row.pct_mtd) : '—'}</td>
      <td class="col-sem">${row.meta > 0 ? deficitVal(row.deficit_meta) : '—'}</td>
      <td class="col-sem">${row.meta > 0 ? R(row.meta_dia_100) : '—'}</td>
      <td class="col-com col-sep val-multi" style="display:none">${R(row.realizado_multi)}</td>
      <td class="col-com" style="display:none">${pctComVal}</td>
      <td class="col-com" style="display:none">${row.meta > 0 ? deficitVal(row.deficit_meta_multi) : '—'}</td>
      <td class="col-com" style="display:none">${row.meta > 0 ? R(row.meta_dia_multi) : '—'}</td>
      <td class="col-sep">${N(row.qtd_ganhos)}</td>
      <td>${R(row.ticket_medio)}</td>
    </tr>`;
}

function toggleGroup(groupId) {
  const squadRow = document.querySelector(`[data-group="${groupId}"]`);
  const memberRows = document.querySelectorAll(`[data-member="${groupId}"]`);
  const isOpen = squadRow.classList.toggle('open');
  memberRows.forEach(r => r.classList.toggle('visible', isOpen));
}

function toggleSdrGroup(groupId) {
  const groupRow = document.querySelector(`[data-sdr-group="${groupId}"]`);
  const memberRows = document.querySelectorAll(`[data-sdr-member="${groupId}"]`);
  const isOpen = groupRow.classList.toggle('open');
  memberRows.forEach(r => r.classList.toggle('visible', isOpen));
}

// ── MODO SEM/COM MULTIPLICADOR ────────────────────────────────
let modoMulti = false;
function setModo(multi) {
  modoMulti = multi;
  document.querySelectorAll('.toggle-btn').forEach((b, i) =>
    b.classList.toggle('active', i === (multi ? 1 : 0)));
  document.querySelectorAll('.col-sem').forEach(el => el.style.display = multi ? 'none' : '');
  document.querySelectorAll('.col-com').forEach(el => el.style.display = multi ? '' : 'none');
}


// ── SDR TABLE ─────────────────────────────────────────────
function makeSdrRow(s, cls = '') {
  return `
    <tr class="${cls}">
      <td>${s.nome}</td>
      <td>${N(s.meta_reuniao)}</td>
      <td>${s.meta_diaria.toFixed(1)}</td>
      <td>${N(s.validadas)}</td>
      <td>${s.deveria_estar.toFixed(0)}</td>
      <td>${s.faltam <= 0
        ? `<span class="surplus">${N(Math.abs(s.faltam))}</span>`
        : `<span class="deficit">${N(s.faltam)}</span>`}</td>
      <td>${pctBadge(s.pct_reu)}</td>
      <td>${R(s.meta_ganho)}</td>
      <td>${N(s.qtd_ganhos)}</td>
      <td>${R(s.valor_ganho)}</td>
      <td class="val-multi">${R(s.valor_ganho_multi)}</td>
      <td>${pctBadge(s.pct_ganhos)}</td>
      <td>${R(s.ticket_medio)}</td>
      <td>${pctBadge(s.pct_final)}</td>
    </tr>`;
}

function renderSdrs(sdrs) {
  const body  = sdrs.filter(s => s.nome !== 'TOTAL');
  const total = sdrs.find(s => s.nome === 'TOTAL');
  return `
    <div class="section">
      <div class="section-header">
        <div class="section-title">SDR's</div>
      </div>
      <div class="card">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th style="text-align:left">SDR</th>
                <th>Meta Reunião</th>
                <th>Meta Diária</th>
                <th>Validadas</th>
                <th>Deveriam Estar</th>
                <th>Faltam</th>
                <th>% Ating. Reu.</th>
                <th>Meta Ganho</th>
                <th>Qtd Ganhos</th>
                <th>R$ Ganho</th>
                <th>R$ c/ Multi</th>
                <th>% Ganhos</th>
                <th>Ticket Médio</th>
                <th>% Final</th>
              </tr>
            </thead>
            <tbody>
              ${(() => {
      // Group SDRs by subarea
      const groups = {};
      body.forEach(s => {
        const sub = (s.subarea || 'Outros').toUpperCase() === 'MGM' ? 'Olympus' : (s.subarea || 'Outros');
        if (!groups[sub]) groups[sub] = [];
        groups[sub].push(s);
      });
      let html = '';
      Object.entries(groups).forEach(([sub, members], gi) => {
        const gid = 'sdr_' + gi;
        // Aggregate group
        const tReu   = members.reduce((a,s) => a + s.meta_reuniao, 0);
        const tValid = members.reduce((a,s) => a + s.validadas, 0);
        const tDev   = members.reduce((a,s) => a + s.deveria_estar, 0);
        const tFalt  = members.reduce((a,s) => a + s.faltam, 0);
        const tGanho = members.reduce((a,s) => a + s.valor_ganho, 0);
        const tMulti = members.reduce((a,s) => a + s.valor_ganho_multi, 0);
        const tMeta  = members.reduce((a,s) => a + s.meta_ganho, 0);
        const tQtd   = members.reduce((a,s) => a + s.qtd_ganhos, 0);
        const pReu   = tReu ? (tValid/tReu*100) : 0;
        const pGan   = tMeta ? (tMulti/tMeta*100) : 0;
        const pFin   = (pReu + pGan) / 2;
        const grp = { nome: sub, meta_reuniao: tReu,
          meta_diaria: tReu/20, validadas: tValid, deveria_estar: tDev,
          faltam: tFalt, pct_reu: pReu, meta_ganho: tMeta, qtd_ganhos: tQtd,
          valor_ganho: tGanho, valor_ganho_multi: tMulti,
          pct_ganhos: pGan, ticket_medio: tQtd ? tGanho/tQtd : 0, pct_final: pFin };
        html += `<tr class="row-sdr-group" data-sdr-group="${gid}" onclick="toggleSdrGroup('${gid}')">
          <td>${sub}</td>
          <td>${N(grp.meta_reuniao)}</td>
          <td>${grp.meta_diaria.toFixed(1)}</td>
          <td>${N(grp.validadas)}</td>
          <td>${grp.deveria_estar.toFixed(0)}</td>
          <td>${grp.faltam <= 0 ? '<span class="surplus">'+N(Math.abs(grp.faltam))+'</span>' : '<span class="deficit">'+N(grp.faltam)+'</span>'}</td>
          <td>${pctBadge(grp.pct_reu)}</td>
          <td>${R(grp.meta_ganho)}</td>
          <td>${N(grp.qtd_ganhos)}</td>
          <td>${R(grp.valor_ganho)}</td>
          <td class="val-multi">${R(grp.valor_ganho_multi)}</td>
          <td>${pctBadge(grp.pct_ganhos)}</td>
          <td>${R(grp.ticket_medio)}</td>
          <td>${pctBadge(grp.pct_final)}</td>
        </tr>`;
        members.forEach(s => {
          html += `<tr class="row-member" data-sdr-member="${gid}">` + makeSdrRow(s, '').replace('<tr class="">', '').replace('</tr>','') + '</tr>';
        });
      });
      return html;
    })()}
              ${total ? makeSdrRow(total, 'row-total') : ''}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="sdr-bars-section">
      <div class="sdr-bars-title">Atingimento Final por SDR</div>
      <div class="sdr-bars">
        ${body.map(s => `
          <div class="sdr-bar-row">
            <div class="sdr-bar-name">${s.nome}</div>
            <div class="sdr-bar-bg">
              <div class="sdr-bar-fill" style="width:${Math.min(s.pct_final,100)}%;background:${s.pct_final>=100?'#0D7A3E':s.pct_final>=60?'#B8860B':'#B91C1C'}"></div>
            </div>
            <div class="sdr-bar-pct ${s.pct_final>=100?'pct-green':s.pct_final>=60?'pct-amber':'pct-red'}">${s.pct_final.toFixed(1)}%</div>
          </div>`).join('')}
      </div>
    </div>
  `;
}

// ── RENDER ────────────────────────────────────────────────────
function makeRow(row, cls = '', groupId = null) {
  const isSquad = groupId !== null && cls !== 'row-total' && cls !== 'row-meta120';
  const squadCls = isSquad ? `row-squad ${cls}` : cls;
  const dataAttr = isSquad ? `data-group="${groupId}" onclick="toggleGroup('${groupId}')"` : '';
  return `
    <tr class="${squadCls}" ${dataAttr}>
      <td>${row.nome}</td>
      <td>${R(row.meta)}</td>
      <td>${N(row.dias_uteis)}</td>
      <td>${R(row.meta_du)}</td>

      <td class="col-sem val-real">${R(row.realizado)}</td>
      <td class="col-sem">${pctBadge(row.pct_atingido)}</td>
      <td class="col-sem">${R(row.mtd)}</td>
      <td class="col-sem">${deficitVal(row.deficit_mtd)}</td>
      <td class="col-sem">${pctBadge(row.pct_mtd)}</td>
      <td class="col-sem">${deficitVal(row.deficit_meta)}</td>
      <td class="col-sem">${R(row.meta_dia_100)}</td>

      <td class="col-com col-sep val-multi" style="display:none">${R(row.realizado_multi)}</td>
      <td class="col-com" style="display:none">${pctBadge(row.pct_atingido_multi)}</td>
      <td class="col-com" style="display:none">${deficitVal(row.deficit_meta_multi)}</td>
      <td class="col-com" style="display:none">${R(row.meta_dia_multi)}</td>

      <td class="col-sep">${N(row.qtd_ganhos)}</td>
      <td>${R(row.ticket_medio)}</td>
    </tr>`;
}

function renderAbril(data) {
  const p = data.periodo;

  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('periodo-badge').innerHTML =
    `${MESES[p.mes-1]} ${p.ano} &nbsp;·&nbsp; <strong>${p.du_passados}</strong>${p.du_total > 0 ? '/'+p.du_total : ''} dias úteis &nbsp;·&nbsp; <strong>${p.du_restantes}</strong> restantes`;
  // Sync selectors with returned period
  const selMes = document.getElementById('sel-mes');
  const selAno = document.getElementById('sel-ano');
  if (selMes) selMes.value = p.mes;
  if (selAno) { if (![...selAno.options].find(o=>o.value==p.ano)) { const o=document.createElement('option'); o.value=p.ano; o.text=p.ano; selAno.appendChild(o); } selAno.value=p.ano; }
  const tabEl = document.getElementById('tab-abril'); if(tabEl) tabEl.textContent = MESES[p.mes-1] + ' ' + p.ano;
  document.getElementById('update-info').textContent = `Atualizado: ${p.atualizado_em}`;

  const { squads, total, meta_120 } = data.closers;

  // Aviso de debug se não tiver squads
  const debugAviso = squads.length === 0 ? `
    <div style="background:#FEF9C3;border:1px solid #FDE047;border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#713F12">
      <strong>Atenção:</strong> Nenhum closer encontrado nas metas.
      Acesse <a href="/api/debug/metas" target="_blank" style="color:#92400E"><strong>/api/debug/metas</strong></a>
      e me mostre o resultado para ajustar os dados.
      ${data._debug ? `<br>Total de linhas lidas: ${data._debug.total_metas} | Closers: ${data._debug.closers_encontrados}` : ''}
    </div>` : '';

  document.getElementById('abril-content').innerHTML = `
    ${debugAviso}
    <div class="section">
      <div class="section-header">
        <div class="section-title">Performance por Squad — Closers</div>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setModo(false)">Sem Multiplicador</button>
          <button class="toggle-btn" onclick="setModo(true)">Com Multiplicador</button>
        </div>
      </div>
      <div class="card">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th class="th-group" rowspan="2" style="text-align:left">Squad</th>
                <th class="th-group" rowspan="2">Meta</th>
                <th class="th-group" rowspan="2">Dias Úteis</th>
                <th class="th-group" rowspan="2">Meta / DU</th>
                <th class="th-group col-sem" colspan="7">Sem Multiplicador</th>
                <th class="th-group col-com col-sep" colspan="4" style="display:none">Com Multiplicador</th>
                <th class="th-group col-sep" colspan="2">Performance</th>
              </tr>
              <tr>
                <th class="col-sem">Realizado</th>
                <th class="col-sem">% Ating.</th>
                <th class="col-sem">MTD</th>
                <th class="col-sem">Déficit MTD</th>
                <th class="col-sem">% MTD</th>
                <th class="col-sem">Déficit 100%</th>
                <th class="col-sem">Meta/Dia</th>
                <th class="col-com col-sep" style="display:none">Real c/ Multi</th>
                <th class="col-com" style="display:none">% c/ Multi</th>
                <th class="col-com" style="display:none">Déficit 100%</th>
                <th class="col-com" style="display:none">Meta/Dia</th>
                <th class="col-sep">Vol. Ganhos</th>
                <th>Ticket Médio</th>
              </tr>
            </thead>
            <tbody>
              ${squads.map((r, i) => {
                const gid = 'squad_' + i;
                let html = makeRow(r, '', gid);
                if (r.members) {
                  r.members.forEach(m => {
                    const mr = buildMemberRow(m, gid);
                    html += mr;
                  });
                }
                return html;
              }).join('')}
              ${makeRow(total, 'row-total')}

            </tbody>
          </table>
        </div>
      </div>
    </div>
    ${data.head_results && data.head_results.length ? renderHeadResults(data.head_results) : ''}
  ${data.sdrs && data.sdrs.length ? renderSdrs(data.sdrs) : ''}
  `;
}

// ── FETCH ─────────────────────────────────────────────────────
async function fetchAbril() {
  try {
    const mes = document.getElementById('sel-mes')?.value || '';
    const ano = document.getElementById('sel-ano')?.value || '';
    const res = await fetch(`/api/abril?mes=${mes}&ano=${ano}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.erro) throw new Error(data.erro);
    renderAbril(data);
  } catch(e) {
    document.getElementById('abril-content').innerHTML =
      `<div class="card"><div class="error-state">Erro: ${e.message}</div></div>`;
    console.error(e);
  }
}

fetchAbril();
setInterval(fetchAbril, 5 * 60 * 1000);
</script>
</body>
</html>
